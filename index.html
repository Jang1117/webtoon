<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 시간표 — 네이버 & 카카오</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --naver: #03C75A;
    --kakao: #FFCD00;
    --kakao-dark: #3C1E1E;
    --bg: #0A0A0F;
    --surface: #13131A;
    --surface2: #1C1C26;
    --border: rgba(255,255,255,0.06);
    --text: #E8E8F0;
    --text-muted: #666680;
    --accent: #6C63FF;
    --radius: 12px;
  }

  :root.light {
    --bg: #F4F4F8;
    --surface: #FFFFFF;
    --surface2: #EEEEF4;
    --border: rgba(0,0,0,0.08);
    --text: #18181F;
    --text-muted: #8888A4;
    --accent: #6C63FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(3,199,90,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .light body::before, :root.light body::before {
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(3,199,90,0.04) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    transition: background 0.3s;
  }
  :root.light header {
    background: rgba(244,244,248,0.88);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #03C75A, #6C63FF, #FFCD00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
  }

  /* ── PLATFORM FILTER ── */
  .platform-filter {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .plat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .plat-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .plat-btn.active-naver { border-color: var(--naver); color: var(--naver); background: rgba(3,199,90,0.08); }
  .plat-btn.active-kakao { border-color: var(--kakao); color: #c9a000; background: rgba(255,205,0,0.08); }
  .plat-btn:not([class*="active"]):hover { border-color: var(--border); color: var(--text); background: var(--surface2); }

  /* ── DAY TABS ── */
  .day-tabs {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 0;
    display: flex;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .day-tab {
    flex: 1;
    padding: 10px 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .day-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  .day-tab.active {
    color: #fff;
    border-color: var(--accent);
    background: rgba(108,99,255,0.15);
    box-shadow: 0 0 20px rgba(108,99,255,0.2);
  }


  .day-tab.finished-tab {
    color: var(--naver);
    font-weight: 700;
  }

  .day-tab.finished-tab.active {
    border-color: var(--naver);
    background: rgba(3,199,90,0.15);
    box-shadow: 0 0 20px rgba(3,199,90,0.18);
  }

  .day-tab.today::after {
    content: '오늘';
    position: absolute;
    top: 4px; right: 4px;
    font-size: 9px;
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    padding: 1px 4px;
    font-weight: 700;
  }

  /* ── MAIN ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    letter-spacing: -1px;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── PLATFORM SECTIONS ── */
  .platform-section {
    margin-bottom: 40px;
  }

  .platform-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .platform-label .logo-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 6px;
  }

  .logo-badge.naver { background: rgba(3,199,90,0.12); color: var(--naver); border: 1px solid rgba(3,199,90,0.25); }
  .logo-badge.kakao { background: rgba(255,205,0,0.12); color: #c9a000; border: 1px solid rgba(255,205,0,0.25); }

  .platform-link {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    margin-left: auto;
    transition: color 0.2s;
  }
  .platform-link:hover { color: var(--text); }

  /* ── WEBTOON GRID ── */
  .webtoon-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
  }

  @media (max-width: 900px) {
    .webtoon-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }
  @media (max-width: 600px) {
    main { padding: 16px; }
    .day-tabs { padding: 18px 16px 0; gap: 3px; }
    .day-tab { font-size: 11px; padding: 8px 1px; }
    .webtoon-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .card-title { font-size: 11px; }
    .card-author { font-size: 10px; }
    .card-tag { font-size: 9px; }
  }

  .webtoon-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  .webtoon-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.15);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 480 / 623;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .webtoon-card:hover .card-thumb img { transform: scale(1.05); }

  .thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: linear-gradient(135deg, var(--surface2), rgba(108,99,255,0.1));
  }

  .thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-platform-dot {
    position: absolute;
    top: 8px; right: 8px;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.5);
  }
  .card-platform-dot.naver { background: var(--naver); }
  .card-platform-dot.kakao { background: var(--kakao); }

  .card-new-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .card-info {
    padding: 6px 8px 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-author {
    font-size: 10px;
    color: var(--text-muted);
  }

  .card-tags {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .card-tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    gap: 16px;
    color: var(--text-muted);
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  .plat-btn.add-btn {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,99,255,0.1);
    font-weight: 700;
  }
  .plat-btn.add-btn:hover {
    background: rgba(108,99,255,0.2);
    color: #fff;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-muted); }
  select.form-input { cursor: pointer; }
  option { background: #1C1C26; }

  .btn-primary {
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.05); }

  .card-delete-btn {
    position: absolute;
    top: 4px; left: 4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(229,62,62,0.85);
    border: none;
    color: #fff;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
    padding: 0;
  }
  .webtoon-card:hover .card-delete-btn { display: flex; }
  .card-custom-badge {
    position: absolute;
    bottom: 6px; left: 6px;
    background: rgba(108,99,255,0.85);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .theme-toggle:hover { border-color: rgba(108,99,255,0.5); color: var(--text); }

  /* ── EDIT BUTTON ── */
  .card-edit-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(108,99,255,0.85);
    border: none;
    color: #fff;
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
    padding: 0;
  }
  .webtoon-card:hover .card-edit-btn { display: flex; }

  /* ── SELECT OPTION LIGHT ── */
  :root.light select.form-input option { background: #FFFFFF; color: #18181F; }
  :root.light .form-input { background: #EEEEF4; border-color: rgba(0,0,0,0.1); color: #18181F; }
  :root.light .form-input::placeholder { color: #8888A4; }
  :root.light .btn-secondary { background: #EEEEF4; border-color: rgba(0,0,0,0.1); color: #555570; }
  :root.light .btn-secondary:hover { background: #E0E0EC; }
  :root.light #toast { background: #FFFFFF; border-color: rgba(0,0,0,0.1); color: #18181F; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }

  .fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">📚 웹툰시간표</div>
    <div class="platform-filter">
      <button class="plat-btn active-naver" onclick="togglePlatform('naver', this)">
        <span class="dot" style="background:var(--naver)"></span> 네이버
      </button>
      <button class="plat-btn active-kakao" onclick="togglePlatform('kakao', this)">
        <span class="dot" style="background:var(--kakao)"></span> 카카오
      </button>
      <button class="plat-btn add-btn" onclick="openModal()">＋ 추가</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 다크</button>
    </div>
  </div>
</header>

<div class="day-tabs" id="dayTabs"></div>

<main id="main">
  <div class="loading-state"><div class="spinner"></div> 웹툰 정보를 불러오는 중...</div>
</main>

<div id="toast"></div>

<!-- ── 추가 모달 ── -->
<div id="modal-overlay" onclick="closeModal()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; backdrop-filter:blur(6px);"></div>
<div id="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:201; width:min(480px, calc(100vw - 32px)); background:var(--surface); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:28px; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
    <h3 style="font-family:'Black Han Sans',sans-serif; font-size:20px; letter-spacing:-0.5px; color:var(--text);">웹툰 추가</h3>
    <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; line-height:1; padding:4px 8px;">&times;</button>
  </div>

  <div style="display:flex; flex-direction:column; gap:16px;">
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input type="text" id="inp-title" class="form-input" placeholder="웹툰 제목을 입력하세요" />
    </div>
    <div class="form-group">
      <label class="form-label">링크 (URL) *</label>
      <input type="url" id="inp-url" class="form-input" placeholder="https://..." />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">작가</label>
        <input type="text" id="inp-author" class="form-input" placeholder="작가명" />
      </div>
      <div class="form-group">
        <label class="form-label">장르</label>
        <input type="text" id="inp-genre" class="form-input" placeholder="로맨스, 액션..." />
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">플랫폼 *</label>
        <select id="inp-platform" class="form-input">
          <option value="naver">네이버 웹툰</option>
          <option value="kakao">카카오 웹툰</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">연재 요일 *</label>
        <select id="inp-day" class="form-input">
          <option value="mon">월요일</option>
          <option value="tue">화요일</option>
          <option value="wed">수요일</option>
          <option value="thu">목요일</option>
          <option value="fri">금요일</option>
          <option value="sat">토요일</option>
          <option value="sun">일요일</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">이모지 (썸네일 없을 때 표시)</label>
      <input type="text" id="inp-emoji" class="form-input" placeholder="📚" maxlength="4" style="width:80px;" />
    </div>
    <div class="form-group">
      <label class="form-label">썸네일 이미지 URL</label>
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <input type="url" id="inp-thumb" class="form-input" placeholder="https://...이미지주소.jpg" oninput="previewThumb('inp-thumb','inp-thumb-preview')" />
        <div id="inp-thumb-preview" style="width:56px; height:56px; flex-shrink:0; border-radius:8px; overflow:hidden; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px;">🖼️</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="inp-new" style="width:16px; height:16px; cursor:pointer;" />
      <label for="inp-new" style="font-size:13px; color:var(--text-muted); cursor:pointer;">신작 (NEW 뱃지 표시)</label>
    </div>
  </div>

  <div id="form-error" style="display:none; color:#ff6b6b; font-size:13px; margin-top:12px;"></div>

  <div style="display:flex; gap:10px; margin-top:24px;">
    <button onclick="closeModal()" class="btn-secondary" style="flex:1;">취소</button>
    <button onclick="submitAdd()" class="btn-primary" style="flex:2;">추가하기</button>
  </div>
</div>

<!-- ── 삭제 확인 모달 ── -->
<div id="del-overlay" onclick="closeDel()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200;"></div>
<div id="del-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:201; width:min(340px, calc(100vw - 32px)); background:var(--surface); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
  <p style="font-size:15px; color:var(--text); margin-bottom:8px; font-weight:600;">웹툰을 삭제할까요?</p>
  <p id="del-title" style="font-size:13px; color:var(--text-muted); margin-bottom:20px;"></p>
  <div style="display:flex; gap:10px;">
    <button onclick="closeDel()" class="btn-secondary" style="flex:1;">취소</button>
    <button onclick="confirmDel()" style="flex:1; background:#e53e3e; border:none; color:#fff; border-radius:10px; padding:10px; font-size:14px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;">삭제</button>
  </div>
</div>

<!-- ── 수정 모달 ── -->
<div id="edit-overlay" onclick="closeEdit()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; backdrop-filter:blur(6px);"></div>
<div id="edit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:201; width:min(480px, calc(100vw - 32px)); background:var(--surface); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:28px; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
    <h3 style="font-family:'Black Han Sans',sans-serif; font-size:20px; letter-spacing:-0.5px; color:var(--text);">웹툰 수정</h3>
    <button onclick="closeEdit()" style="background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; line-height:1; padding:4px 8px;">&times;</button>
  </div>
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input type="text" id="edit-title" class="form-input" placeholder="웹툰 제목을 입력하세요" />
    </div>
    <div class="form-group">
      <label class="form-label">링크 (URL) *</label>
      <input type="url" id="edit-url" class="form-input" placeholder="https://..." />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">작가</label>
        <input type="text" id="edit-author" class="form-input" placeholder="작가명" />
      </div>
      <div class="form-group">
        <label class="form-label">장르</label>
        <input type="text" id="edit-genre" class="form-input" placeholder="로맨스, 액션..." />
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">이모지</label>
        <input type="text" id="edit-emoji" class="form-input" placeholder="📚" maxlength="4" />
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); cursor:pointer; padding-bottom:4px;">
          <input type="checkbox" id="edit-new" style="width:16px; height:16px; cursor:pointer;" />
          신작 (NEW 뱃지)
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">썸네일 이미지 URL</label>
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <input type="url" id="edit-thumb" class="form-input" placeholder="https://...이미지주소.jpg" oninput="previewThumb('edit-thumb','edit-thumb-preview')" />
        <div id="edit-thumb-preview" style="width:56px; height:56px; flex-shrink:0; border-radius:8px; overflow:hidden; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px;">🖼️</div>
      </div>
    </div>
  </div>
  <div id="edit-error" style="display:none; color:#ff6b6b; font-size:13px; margin-top:12px;"></div>
  <div style="display:flex; gap:10px; margin-top:24px;">
    <button onclick="closeEdit()" class="btn-secondary" style="flex:1;">취소</button>
    <button onclick="submitEdit()" class="btn-primary" style="flex:2;">저장하기</button>
  </div>
</div>

<script>
const DAYS = ['월', '화', '수', '목', '금', '토', '일', '완결'];
const DAY_KEYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun', 'finished'];
const WEEKDAY_KEYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
const FINISHED_KEY = 'finished';
const DAY_LABELS = { mon: '월', tue: '화', wed: '수', thu: '목', fri: '금', sat: '토', sun: '일', finished: '완결' };

const todayIdx = (new Date().getDay() + 6) % 7;
let selectedDay = todayIdx;
let activePlatforms = { naver: true, kakao: true };
let dataLoadStatus = 'loading';
let loadMessages = [];

const dataStore = {
  naver: emptyPlatformData(),
  kakao: emptyPlatformData(),
};

function emptyPlatformData() {
  return { mon: [], tue: [], wed: [], thu: [], fri: [], sat: [], sun: [], finished: [] };
}

const DATA_FILES = [
  { platform: 'naver', section: 'weekday', file: 'naver-webtoon.json' },
  { platform: 'naver', section: 'finished', file: 'naver-finished-webtoon.json' },
  { platform: 'kakao', section: 'weekday', day: 'mon', file: 'kakao-webtoon-mon.json' },
  { platform: 'kakao', section: 'weekday', day: 'tue', file: 'kakao-webtoon-tue.json' },
  { platform: 'kakao', section: 'weekday', day: 'wed', file: 'kakao-webtoon-wed.json' },
  { platform: 'kakao', section: 'weekday', day: 'thu', file: 'kakao-webtoon-thu.json' },
  { platform: 'kakao', section: 'weekday', day: 'fri', file: 'kakao-webtoon-fri.json' },
  { platform: 'kakao', section: 'weekday', day: 'sat', file: 'kakao-webtoon-sat.json' },
  { platform: 'kakao', section: 'weekday', day: 'sun', file: 'kakao-webtoon-sun.json' },
  { platform: 'kakao', section: 'finished', file: 'kakao-webtoon-finished.json' },
];

// ── 사용자 커스텀 데이터 (localStorage 저장)
const STORAGE_KEY = 'webtoon_custom_v1';
let customData = loadCustomData();

function loadCustomData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveCustomData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(customData)); } catch {}
}

function getItemId(item, platform, sectionOrDay, index = 0) {
  const fromUrl = item.url ? (item.url.match(/titleId=([^&]+)/)?.[1] || item.url.match(/\/content\/[^/]+\/([^/?#]+)/)?.[1]) : '';
  return item.id || item.titleId || item._jsonId || fromUrl || `${platform}__${sectionOrDay}__${item.title || 'item'}__${index}`;
}

function normalizeItem(item, platform, sectionOrDay, index = 0) {
  if (!item || typeof item !== 'object') return null;
  const title = String(item.title || item.titleName || item.name || '').trim();
  const url = String(item.url || item.link || item.webUrl || '').trim();
  const thumb = String(item.thumb || item.thumbnail || item.thumbnailUrl || item.imageUrl || '').trim();
  if (!title || !url) return null;

  const isFinished = sectionOrDay === FINISHED_KEY || item.status === 'finished' || item.section === FINISHED_KEY;
  const id = getItemId(item, platform, sectionOrDay, index);

  return {
    ...item,
    title,
    url,
    thumb,
    author: item.author || (isFinished ? `${platform === 'naver' ? '네이버' : '카카오'} 완결` : `${platform === 'naver' ? '네이버' : '카카오'} 웹툰`),
    genre: item.genre || (isFinished ? '완결' : (item.dayLabel ? `${item.dayLabel}요일` : '웹툰')),
    emoji: item.emoji || (isFinished ? '✅' : '📚'),
    platform,
    status: isFinished ? 'finished' : (item.status || 'ongoing'),
    section: isFinished ? FINISHED_KEY : item.section,
    sectionLabel: isFinished ? '완결' : item.sectionLabel,
    day: isFinished ? FINISHED_KEY : (item.day || sectionOrDay),
    dayLabel: isFinished ? '완결' : (item.dayLabel || DAY_LABELS[sectionOrDay] || ''),
    _jsonId: `${platform}__${sectionOrDay}__${id}`,
  };
}

function dedupeItems(items) {
  const seen = new Set();
  const result = [];
  for (const item of items || []) {
    if (!item) continue;
    const key = item.url || item._jsonId || item.title;
    if (seen.has(key)) continue;
    seen.add(key);
    result.push(item);
  }
  return result;
}

function mergeItems(platform, key, items) {
  if (!dataStore[platform] || !dataStore[platform][key]) return;
  const normalized = (items || []).map((item, idx) => normalizeItem(item, platform, key, idx)).filter(Boolean);
  dataStore[platform][key] = dedupeItems([...(dataStore[platform][key] || []), ...normalized]);
}

function extractListsFromRaw(raw, platformHint, dayHint, sectionHint) {
  const lists = [];

  function add(platform, key, list) {
    if (!platform || !key || !Array.isArray(list)) return;
    lists.push({ platform, key, list });
  }

  if (!raw || typeof raw !== 'object') return lists;

  // 추천 통합 구조: { platforms: { naver: { weekday:{mon:[]}, finished:[] } } }
  if (raw.platforms) {
    for (const platform of ['naver', 'kakao']) {
      const p = raw.platforms[platform];
      if (!p) continue;
      for (const day of WEEKDAY_KEYS) add(platform, day, p.weekday?.[day] || p[day]);
      add(platform, FINISHED_KEY, p.finished || p.weekday?.finished);
    }
  }

  // 일반 구조: { naver:{mon:[], finished:[]} }, { kakao:{tue:[]} }
  for (const platform of ['naver', 'kakao']) {
    const p = raw[platform];
    if (!p) continue;
    for (const day of WEEKDAY_KEYS) add(platform, day, p[day] || p.weekday?.[day]);
    add(platform, FINISHED_KEY, p.finished || p.naverFinished || p.kakaoFinished);
  }

  // 이전 네이버 완결 구조: { naverFinished: [] }
  add('naver', FINISHED_KEY, raw.naverFinished);
  add(platformHint, FINISHED_KEY, raw.finished);

  // 파일명으로 요일을 알고 있는 경우: 배열이 루트에 있거나 빈 구조가 섞인 경우 대응
  if (Array.isArray(raw)) add(platformHint, dayHint || sectionHint, raw);
  if (platformHint && dayHint && raw[dayHint]) add(platformHint, dayHint, raw[dayHint]);

  return lists;
}

async function fetchJsonFile(file, optional = false) {
  const url = `${file}?v=${Date.now()}`;
  try {
    const response = await fetch(url, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const json = await response.json();
    loadMessages.push(`OK ${file}`);
    return json;
  } catch (error) {
    const message = `${optional ? 'SKIP' : 'MISS'} ${file}: ${error.message}`;
    loadMessages.push(message);
    if (!optional) console.warn(message);
    return null;
  }
}

async function loadAllJsonData() {
  dataLoadStatus = 'loading';
  renderLoading();

  for (const fileInfo of DATA_FILES) {
    const raw = await fetchJsonFile(fileInfo.file, !!fileInfo.optional);
    if (!raw) continue;
    const lists = extractListsFromRaw(raw, fileInfo.platform === 'all' ? null : fileInfo.platform, fileInfo.day, fileInfo.section);
    for (const { platform, key, list } of lists) {
      mergeItems(platform, key, list);
    }
  }

  dataLoadStatus = 'loaded';
  renderContent();
  console.log('JSON 로드 결과', { dataStore, loadMessages });
}

function renderLoading() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading-state"><div class="spinner"></div> JSON 데이터를 불러오는 중...</div>';
}

// ── 모달 제어
function openModal() {
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('modal').style.display = 'block';
  document.getElementById('inp-day').value = WEEKDAY_KEYS.includes(DAY_KEYS[selectedDay]) ? DAY_KEYS[selectedDay] : 'mon';
  document.getElementById('inp-emoji').value = '📚';
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('inp-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('modal').style.display = 'none';
  ['inp-title','inp-url','inp-author','inp-genre','inp-emoji','inp-thumb'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('inp-new').checked = false;
  const prev = document.getElementById('inp-thumb-preview');
  prev.innerHTML = '🖼️';
  prev.style.fontSize = '22px';
}

function submitAdd() {
  const title = document.getElementById('inp-title').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const author = document.getElementById('inp-author').value.trim() || '작가 미상';
  const genre = document.getElementById('inp-genre').value.trim() || '기타';
  const platform = document.getElementById('inp-platform').value;
  const day = document.getElementById('inp-day').value;
  const emoji = document.getElementById('inp-emoji').value.trim() || '📚';
  const thumb = document.getElementById('inp-thumb').value.trim();
  const isNew = document.getElementById('inp-new').checked;

  if (!title) { showFormError('제목을 입력해주세요.'); return; }
  if (!url) { showFormError('링크(URL)를 입력해주세요.'); return; }
  if (!url.startsWith('http')) { showFormError('올바른 URL 형식으로 입력해주세요. (http:// 또는 https://)'); return; }

  if (!customData[platform]) customData[platform] = {};
  if (!customData[platform][day]) customData[platform][day] = [];

  const newEntry = { title, url, author, genre, emoji, thumb, isNew, custom: true, id: Date.now() };
  customData[platform][day].push(newEntry);
  saveCustomData();

  closeModal();
  const dayIdx = DAY_KEYS.indexOf(day);
  if (dayIdx !== -1) { selectedDay = dayIdx; renderDayTabs(); }
  renderContent();
  showToast(`"${title}" 추가 완료!`);
}

function showFormError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── 삭제
let pendingDel = null;

function openDel(platform, day, id, title, isCustom) {
  pendingDel = { platform, day, id, isCustom };
  document.getElementById('del-title').textContent = `"${title}"`;
  document.getElementById('del-overlay').style.display = 'block';
  document.getElementById('del-modal').style.display = 'block';
}

function closeDel() {
  pendingDel = null;
  document.getElementById('del-overlay').style.display = 'none';
  document.getElementById('del-modal').style.display = 'none';
}

function confirmDel() {
  if (!pendingDel) return;
  const { platform, day, id, isCustom } = pendingDel;

  if (isCustom) {
    if (customData[platform] && customData[platform][day]) {
      customData[platform][day] = customData[platform][day].filter(w => w.id !== id);
    }
  } else {
    if (!customData._deleted) customData._deleted = [];
    if (!customData._deleted.includes(id)) customData._deleted.push(id);
  }

  saveCustomData();
  closeDel();
  renderContent();
  showToast('삭제되었습니다.');
}

// ── 테마 토글
function toggleTheme() {
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  if (root.classList.contains('light')) {
    root.classList.remove('light');
    btn.textContent = '🌙 다크';
    localStorage.setItem('webtoon_theme', 'dark');
  } else {
    root.classList.add('light');
    btn.textContent = '☀️ 라이트';
    localStorage.setItem('webtoon_theme', 'light');
  }
}

(function() {
  if (localStorage.getItem('webtoon_theme') === 'light') {
    document.documentElement.classList.add('light');
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = '☀️ 라이트';
    });
  }
})();

// ── 수정 모달
let pendingEdit = null;

function findItemForEdit(platform, day, id, isCustom) {
  if (isCustom) {
    const list = customData[platform] && customData[platform][day];
    return list && list.find(w => w.id === id);
  }
  const override = customData._overrides && customData._overrides[id];
  if (override) return override;
  return (dataStore[platform]?.[day] || []).find(w => (w._jsonId || getItemId(w, platform, day)) === id);
}

function openEdit(platform, day, id, event, isCustom) {
  if (event) { event.preventDefault(); event.stopPropagation(); }
  const item = findItemForEdit(platform, day, id, isCustom);
  if (!item) return;

  pendingEdit = { platform, day, id, isCustom };
  document.getElementById('edit-title').value = item.title || '';
  document.getElementById('edit-url').value = item.url || '';
  document.getElementById('edit-author').value = item.author || '';
  document.getElementById('edit-genre').value = item.genre || '';
  document.getElementById('edit-emoji').value = item.emoji || '📚';
  document.getElementById('edit-thumb').value = item.thumb || '';
  document.getElementById('edit-new').checked = !!item.isNew;
  document.getElementById('edit-error').style.display = 'none';
  previewThumb('edit-thumb', 'edit-thumb-preview');
  document.getElementById('edit-overlay').style.display = 'block';
  document.getElementById('edit-modal').style.display = 'block';
  document.getElementById('edit-title').focus();
}

function closeEdit() {
  pendingEdit = null;
  document.getElementById('edit-overlay').style.display = 'none';
  document.getElementById('edit-modal').style.display = 'none';
  const prev = document.getElementById('edit-thumb-preview');
  prev.innerHTML = '🖼️';
  prev.style.fontSize = '22px';
}

function submitEdit() {
  if (!pendingEdit) return;
  const { platform, day, id, isCustom } = pendingEdit;
  const title = document.getElementById('edit-title').value.trim();
  const url = document.getElementById('edit-url').value.trim();
  const author = document.getElementById('edit-author').value.trim() || '작가 미상';
  const genre = document.getElementById('edit-genre').value.trim() || '기타';
  const emoji = document.getElementById('edit-emoji').value.trim() || '📚';
  const thumb = document.getElementById('edit-thumb').value.trim();
  const isNew = document.getElementById('edit-new').checked;
  const errEl = document.getElementById('edit-error');

  if (!title) { errEl.textContent = '제목을 입력해주세요.'; errEl.style.display = 'block'; return; }
  if (!url) { errEl.textContent = '링크(URL)를 입력해주세요.'; errEl.style.display = 'block'; return; }
  if (!url.startsWith('http')) { errEl.textContent = '올바른 URL 형식으로 입력해주세요.'; errEl.style.display = 'block'; return; }

  if (isCustom) {
    const list = customData[platform] && customData[platform][day];
    if (!list) return;
    const idx = list.findIndex(w => w.id === id);
    if (idx === -1) return;
    list[idx] = { ...list[idx], title, url, author, genre, emoji, thumb, isNew };
  } else {
    if (!customData._overrides) customData._overrides = {};
    customData._overrides[id] = { title, url, author, genre, emoji, thumb, isNew };
  }

  saveCustomData();
  closeEdit();
  renderContent();
  showToast(`"${title}" 수정 완료!`);
}

// ── 썸네일 미리보기
function previewThumb(inputId, previewId) {
  const url = document.getElementById(inputId).value.trim();
  const box = document.getElementById(previewId);
  if (!url) {
    box.innerHTML = '🖼️';
    box.style.fontSize = '22px';
    return;
  }
  const img = new Image();
  img.onload = () => {
    box.innerHTML = '';
    box.style.fontSize = '';
    const el = document.createElement('img');
    el.src = url;
    el.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    box.appendChild(el);
  };
  img.onerror = () => {
    box.innerHTML = '❌';
    box.style.fontSize = '22px';
  };
  img.src = url;
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = DAYS.map((day, i) => `
    <button class="day-tab ${i === selectedDay ? 'active' : ''} ${i === todayIdx ? 'today' : ''} ${DAY_KEYS[i] === FINISHED_KEY ? 'finished-tab' : ''}"
      onclick="selectDay(${i})">${day}${DAY_KEYS[i] === FINISHED_KEY ? '' : '요일'}</button>
  `).join('');
}

function selectDay(idx) {
  selectedDay = idx;
  renderDayTabs();
  renderContent();
}

function togglePlatform(plat, btn) {
  activePlatforms[plat] = !activePlatforms[plat];
  btn.className = activePlatforms[plat] ? `plat-btn active-${plat}` : 'plat-btn';
  renderContent();
}

function applySavedChanges(list, platform, key) {
  const deleted = customData._deleted || [];
  const overrides = customData._overrides || {};
  return (list || [])
    .map((w, idx) => {
      const id = w._jsonId || `${platform}__${key}__${getItemId(w, platform, key, idx)}`;
      if (deleted.includes(id)) return null;
      const ov = overrides[id];
      return { ...(ov ? { ...w, ...ov } : w), _plat: platform, custom: false, _jsonId: id };
    })
    .filter(Boolean);
}

function customList(platform, key) {
  return ((customData[platform] && customData[platform][key]) || []).map(w => ({ ...w, _plat: platform, custom: true }));
}

function renderContent() {
  if (dataLoadStatus === 'loading') { renderLoading(); return; }

  const key = DAY_KEYS[selectedDay];
  if (key === FINISHED_KEY) {
    renderFinishedContent();
    return;
  }

  const main = document.getElementById('main');
  const dayName = DAYS[selectedDay];

  const naverList = activePlatforms.naver ? [
    ...applySavedChanges(dataStore.naver[key] || [], 'naver', key),
    ...customList('naver', key)
  ] : [];
  const kakaoList = activePlatforms.kakao ? [
    ...applySavedChanges(dataStore.kakao[key] || [], 'kakao', key),
    ...customList('kakao', key)
  ] : [];
  const otherList = customList('other', key);

  const total = naverList.length + kakaoList.length + otherList.length;

  let html = `
    <div class="section-header fade-in">
      <h2 class="section-title">${dayName}요일 웹툰</h2>
      <div class="count-badge">총 ${total}작품</div>
    </div>
  `;

  if (total === 0) {
    html += `<div class="empty-state fade-in"><div class="icon">😶</div><p>표시할 웹툰이 없습니다. JSON 파일명과 구조를 확인해주세요.</p></div>`;
    main.innerHTML = html;
    return;
  }

  if (naverList.length > 0) html += renderPlatformSection('naver', '🟢 NAVER 웹툰', `https://comic.naver.com/webtoon?tab=${key}`, naverList, key);
  if (kakaoList.length > 0) html += renderPlatformSection('kakao', '🟡 KAKAO 웹툰', 'https://webtoon.kakao.com/', kakaoList, key);
  if (otherList.length > 0) html += renderPlatformSection('other', '🔵 기타', '', otherList, key);

  main.innerHTML = html;
}

function renderFinishedContent() {
  const main = document.getElementById('main');
  const naverList = activePlatforms.naver ? applySavedChanges(dataStore.naver.finished || [], 'naver', FINISHED_KEY) : [];
  const kakaoList = activePlatforms.kakao ? applySavedChanges(dataStore.kakao.finished || [], 'kakao', FINISHED_KEY) : [];
  const total = naverList.length + kakaoList.length;

  let html = `
    <div class="section-header fade-in">
      <h2 class="section-title">완결 웹툰</h2>
      <div class="count-badge">총 ${total}작품</div>
    </div>
  `;

  if (total === 0) {
    html += `<div class="empty-state fade-in"><div class="icon">✅</div><p>완결 웹툰 JSON을 찾지 못했거나 데이터가 없습니다.</p></div>`;
    main.innerHTML = html;
    return;
  }

  if (naverList.length > 0) html += renderPlatformSection('naver', '🟢 NAVER 완결 웹툰', 'https://comic.naver.com/webtoon?tab=finish', naverList, FINISHED_KEY);
  if (kakaoList.length > 0) html += renderPlatformSection('kakao', '🟡 KAKAO 완결 웹툰', 'https://webtoon.kakao.com/', kakaoList, FINISHED_KEY);

  main.innerHTML = html;
}

function renderPlatformSection(platform, label, link, list, key) {
  const linkHtml = link ? `<a href="${link}" target="_blank" class="platform-link">전체 보기 →</a>` : '';
  const badgeClass = platform === 'naver' ? 'naver' : platform === 'kakao' ? 'kakao' : '';
  const badgeStyle = platform === 'other' ? 'style="background:rgba(108,99,255,0.12);color:#9b8fff;border:1px solid rgba(108,99,255,0.25);"' : '';
  return `
    <div class="platform-section fade-in">
      <div class="platform-label">
        <span class="logo-badge ${badgeClass}" ${badgeStyle}>${label}</span>
        ${linkHtml}
      </div>
      <div class="webtoon-grid">
        ${list.map(w => renderCard(w, platform, key)).join('')}
      </div>
    </div>
  `;
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value) { return escapeHtml(value); }
function escapeJsString(value) { return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' '); }

function renderCard(w, platform, dayKey) {
  const cardId = w.custom ? w.id : (w._jsonId || `${platform}__${dayKey}__${getItemId(w, platform, dayKey)}`);
  const safeTitle = escapeJsString(w.title);
  const safeUrl = escapeJsString(w.url);
  const isCustom = !!w.custom;
  const delBtn = `<button type="button" class="card-delete-btn" onclick="event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); openDel('${platform}','${dayKey}',${JSON.stringify(cardId)},'${safeTitle}',${isCustom})">×</button>`;
  const editBtn = `<button type="button" class="card-edit-btn" onclick="event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); openEdit('${platform}','${dayKey}',${JSON.stringify(cardId)},event,${isCustom})" title="수정">✎</button>`;
  const customBadge = isCustom ? `<div class="card-custom-badge">내 추가</div>` : '';
  const title = escapeHtml(w.title || '제목 없음');
  const author = escapeHtml(w.author || '');
  const genre = escapeHtml(w.genre || '');
  const emoji = escapeHtml(w.emoji || '📚');
  const thumb = w.thumb ? escapeAttr(w.thumb) : '';

  const thumbContent = thumb
    ? `<img class="thumb-img" src="${thumb}" alt="${title}" referrerpolicy="no-referrer" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" /><div class="thumb-placeholder" style="display:none;">${emoji}</div>`
    : `<div class="thumb-placeholder">${emoji}</div>`;

  return `
    <div class="webtoon-card" role="link" tabindex="0"
      onclick="handleCardClick(event, '${safeUrl}')"
      onkeydown="handleCardKeydown(event, '${safeUrl}')">
      <div class="card-thumb" style="position:relative;">
        ${thumbContent}
        ${delBtn}
        ${editBtn}
        ${w.isNew ? '<div class="card-new-badge">NEW</div>' : ''}
        ${customBadge}
        <div class="card-platform-dot ${platform}"></div>
      </div>
      <div class="card-info">
        <div class="card-title">${title}</div>
        ${author ? `<div class="card-author">${author}</div>` : ''}
        ${genre ? `<div class="card-tags"><span class="card-tag">${genre}</span></div>` : ''}
      </div>
    </div>
  `;
}


function handleCardClick(event, url) {
  if (event.target.closest('button')) return;
  window.open(url, '_blank', 'noopener');
}

function handleCardKeydown(event, url) {
  if (event.target.closest('button')) return;
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    window.open(url, '_blank', 'noopener');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderDayTabs();
loadAllJsonData();
</script>
